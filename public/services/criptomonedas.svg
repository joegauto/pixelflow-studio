<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cryptoBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#cryptoBg2)"/>
  
  <!-- Bitcoin coin -->
  <g transform="translate(300, 150)">
    <circle cx="100" cy="100" r="60" fill="#f59e0b"/>
    <text x="100" y="120" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">₿</text>
  </g>
  
  <!-- Blockchain -->
  <g transform="translate(100, 350)">
    <rect x="0" y="0" width="80" height="60" rx="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
    <text x="40" y="35" font-family="Arial, sans-serif" font-size="12" fill="#0ea5e9" text-anchor="middle">Block 1</text>
    
    <rect x="120" y="0" width="80" height="60" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="160" y="35" font-family="Arial, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">Block 2</text>
    
    <rect x="240" y="0" width="80" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="280" y="35" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">Block 3</text>
    
    <!-- Connections -->
    <line x1="80" y1="30" x2="120" y2="30" stroke="#64748b" stroke-width="4"/>
    <line x1="200" y1="30" x2="240" y2="30" stroke="#64748b" stroke-width="4"/>
  </g>
  
  <!-- Wallet interface -->
  <rect x="450" y="300" width="300" height="200" rx="15" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Crypto Wallet</text>
  
  <!-- Balance -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">$47,832.50</text>
  
  <!-- Holdings -->
  <rect x="470" y="380" width="80" height="50" rx="8" fill="#f59e0b" opacity="0.2"/>
  <text x="510" y="410" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">BTC 1.25</text>
  
  <rect x="560" y="380" width="80" height="50" rx="8" fill="#0ea5e9" opacity="0.2"/>
  <text x="600" y="410" font-family="Arial, sans-serif" font-size="12" fill="#0ea5e9" text-anchor="middle">ETH 15.8</text>
  
  <rect x="650" y="380" width="80" height="50" rx="8" fill="#8b5cf6" opacity="0.2"/>
  <text x="690" y="410" font-family="Arial, sans-serif" font-size="12" fill="#8b5cf6" text-anchor="middle">ADA 2.8K</text>
</svg>