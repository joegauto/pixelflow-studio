<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="secBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0" />
    </radialGradient>
    <filter id="scanline">
      <feFlood flood-color="#00ff00" flood-opacity="0.1"/>
      <feComposite in="SourceGraphic"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#secBg)"/>
  
  <!-- Digital grid pattern -->
  <g opacity="0.1">
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#22c55e" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="1200" height="600" fill="url(#grid)"/>
  </g>
  
  <!-- Central shield -->
  <g transform="translate(500, 200)">
    <circle cx="100" cy="100" r="80" fill="url(#shieldGlow)"/>
    <path d="M100 40 L140 60 L140 120 C140 140, 120 160, 100 160 C80 160, 60 140, 60 120 L60 60 Z" fill="#22c55e" stroke="#16a34a" stroke-width="3"/>
    <path d="M85 100 L95 110 L115 85" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Lock icon inside shield -->
    <rect x="90" y="95" width="20" height="15" rx="2" fill="#ffffff" opacity="0.8"/>
    <path d="M95 95 L95 90 C95 85, 100 80, 105 80 C110 80, 115 85, 115 90 L115 95" stroke="#ffffff" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Security monitoring dashboard -->
  <rect x="150" y="100" width="300" height="200" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  
  <!-- Dashboard header -->
  <rect x="150" y="100" width="300" height="40" rx="12" fill="#334155"/>
  <text x="170" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Security Monitor</text>
  <circle cx="420" cy="120" r="6" fill="#22c55e"/>
  <text x="430" y="125" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">SECURE</text>
  
  <!-- Threat indicators -->
  <rect x="170" y="150" width="80" height="40" rx="6" fill="#0f172a"/>
  <text x="210" y="165" font-family="Arial, sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">Threats</text>
  <text x="210" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#22c55e" text-anchor="middle">0</text>
  
  <rect x="260" y="150" width="80" height="40" rx="6" fill="#0f172a"/>
  <text x="300" y="165" font-family="Arial, sans-serif" font-size="10" fill="#0ea5e9" text-anchor="middle">Scans</text>
  <text x="300" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0ea5e9" text-anchor="middle">247</text>
  
  <rect x="350" y="150" width="80" height="40" rx="6" fill="#0f172a"/>
  <text x="390" y="165" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Updates</text>
  <text x="390" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle">12</text>
  
  <!-- Activity log -->
  <rect x="170" y="200" width="260" height="80" rx="6" fill="#0f172a"/>
  <text x="180" y="220" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Security Log</text>
  
  <circle cx="185" cy="235" r="2" fill="#22c55e"/>
  <text x="195" y="240" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Firewall: Blocked 15 attempts</text>
  
  <circle cx="185" cy="250" r="2" fill="#0ea5e9"/>
  <text x="195" y="255" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">SSL Certificate: Renewed</text>
  
  <circle cx="185" cy="265" r="2" fill="#22c55e"/>
  <text x="195" y="270" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Backup: Completed successfully</text>
  
  <!-- Network diagram -->
  <g transform="translate(750, 150)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <text x="100" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Network Security</text>
    
    <!-- Server -->
    <rect x="80" y="40" width="40" height="30" rx="4" fill="#334155" stroke="#22c55e" stroke-width="2"/>
    <text x="100" y="58" font-family="Arial, sans-serif" font-size="8" fill="#22c55e" text-anchor="middle">SERVER</text>
    
    <!-- Firewall -->
    <rect x="30" y="90" width="50" height="20" rx="4" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="55" y="103" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">FIREWALL</text>
    
    <!-- Devices -->
    <circle cx="150" cy="100" r="12" fill="#0ea5e9" stroke="#0284c7" stroke-width="2"/>
    <text x="150" y="105" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">PC</text>
    
    <!-- Connections -->
    <line x1="100" y1="70" x2="100" y2="85" stroke="#22c55e" stroke-width="2"/>
    <line x1="80" y1="100" x2="138" y2="100" stroke="#22c55e" stroke-width="2"/>
    
    <!-- Threat blocked -->
    <circle cx="20" cy="100" r="8" fill="#ef4444"/>
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">X</text>
    <line x1="28" y1="100" x2="30" y2="100" stroke="#ef4444" stroke-width="3" stroke-dasharray="2,2"/>
  </g>
  
  <!-- Vulnerability scan results -->
  <g transform="translate(150, 350)">
    <rect x="0" y="0" width="400" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <text x="200" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Vulnerability Assessment</text>
    
    <!-- Progress bars -->
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Critical</text>
    <rect x="80" y="42" width="200" height="8" rx="4" fill="#334155"/>
    <rect x="80" y="42" width="20" height="8" rx="4" fill="#ef4444"/>
    <text x="290" y="50" font-family="Arial, sans-serif" font-size="10" fill="#ef4444">2 found</text>
    
    <text x="20" y="70" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">High</text>
    <rect x="80" y="62" width="200" height="8" rx="4" fill="#334155"/>
    <rect x="80" y="62" width="40" height="8" rx="4" fill="#f59e0b"/>
    <text x="290" y="70" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b">5 found</text>
    
    <text x="20" y="90" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Medium</text>
    <rect x="80" y="82" width="200" height="8" rx="4" fill="#334155"/>
    <rect x="80" y="82" width="60" height="8" rx="4" fill="#0ea5e9"/>
    <text x="290" y="90" font-family="Arial, sans-serif" font-size="10" fill="#0ea5e9">8 found</text>
    
    <text x="20" y="110" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Low</text>
    <rect x="80" y="102" width="200" height="8" rx="4" fill="#334155"/>
    <rect x="80" y="102" width="100" height="8" rx="4" fill="#22c55e"/>
    <text x="290" y="110" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">12 found</text>
  </g>
  
  <!-- Floating security elements -->
  <g opacity="0.6">
    <!-- Binary code streams -->
    <text x="50" y="150" font-family="monospace" font-size="10" fill="#22c55e" opacity="0.4">01001000</text>
    <text x="50" y="170" font-family="monospace" font-size="10" fill="#22c55e" opacity="0.3">11010110</text>
    <text x="50" y="190" font-family="monospace" font-size="10" fill="#22c55e" opacity="0.2">00110101</text>
    
    <text x="1050" y="200" font-family="monospace" font-size="10" fill="#0ea5e9" opacity="0.4">10110011</text>
    <text x="1050" y="220" font-family="monospace" font-size="10" fill="#0ea5e9" opacity="0.3">01101001</text>
    <text x="1050" y="240" font-family="monospace" font-size="10" fill="#0ea5e9" opacity="0.2">11001010</text>
  </g>
  
  <!-- Scanning line effect -->
  <rect x="0" y="300" width="1200" height="2" fill="#22c55e" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,-300; 0,600" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">Ciberseguridad Empresarial</text>
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="18" fill="#4ade80" text-anchor="middle">Protección integral contra amenazas digitales</text>
</svg>