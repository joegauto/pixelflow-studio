<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="webBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#webBg)"/>
  
  <!-- Main browser window -->
  <rect x="100" y="100" width="600" height="400" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="100" y="100" width="600" height="40" rx="12" fill="#f1f5f9"/>
  
  <!-- Browser controls -->
  <circle cx="125" cy="120" r="6" fill="#ef4444"/>
  <circle cx="145" cy="120" r="6" fill="#f59e0b"/>
  <circle cx="165" cy="120" r="6" fill="#22c55e"/>
  
  <!-- URL bar -->
  <rect x="200" y="110" width="300" height="20" rx="10" fill="#e2e8f0"/>
  <text x="220" y="123" font-family="Arial, sans-serif" font-size="10" fill="#64748b">https://ejemplo.com</text>
  
  <!-- Website content -->
  <rect x="120" y="160" width="560" height="40" rx="6" fill="#0ea5e9"/>
  <text x="400" y="185" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Tu Empresa</text>
  
  <!-- Navigation -->
  <rect x="120" y="210" width="100" height="20" rx="4" fill="#64748b"/>
  <rect x="230" y="210" width="80" height="20" rx="4" fill="#64748b"/>
  <rect x="320" y="210" width="90" height="20" rx="4" fill="#64748b"/>
  <rect x="420" y="210" width="70" height="20" rx="4" fill="#64748b"/>
  
  <!-- Content sections -->
  <rect x="120" y="250" width="180" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="310" y="250" width="180" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="500" y="250" width="180" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  
  <!-- Mobile device -->
  <rect x="50" y="200" width="80" height="140" rx="15" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="60" y="215" width="60" height="100" rx="6" fill="#ffffff"/>
  <circle cx="90" cy="330" r="8" fill="#334155"/>
  
  <!-- Tablet -->
  <rect x="720" y="180" width="60" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="725" y="190" width="50" height="70" rx="4" fill="#ffffff"/>
  
  <!-- Code elements -->
  <g opacity="0.6">
    <text x="50" y="450" font-family="monospace" font-size="12" fill="#0ea5e9">&lt;html&gt;</text>
    <text x="70" y="470" font-family="monospace" font-size="12" fill="#22c55e">&lt;body&gt;</text>
    <text x="90" y="490" font-family="monospace" font-size="12" fill="#f59e0b">&lt;div&gt;</text>
    
    <text x="650" y="450" font-family="monospace" font-size="12" fill="#8b5cf6">CSS</text>
    <text x="650" y="470" font-family="monospace" font-size="12" fill="#ef4444">JS</text>
    <text x="650" y="490" font-family="monospace" font-size="12" fill="#06b6d4">React</text>
  </g>
  
  <!-- Performance indicators -->
  <rect x="300" y="520" width="200" height="60" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="540" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Performance</text>
  <text x="320" y="560" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">Speed: 95/100</text>
  <text x="420" y="560" font-family="Arial, sans-serif" font-size="10" fill="#0ea5e9">SEO: 98/100</text>
</svg>