<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#aiBg2)"/>
  
  <!-- Chat interface -->
  <rect x="200" y="100" width="400" height="400" rx="20" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  
  <!-- Chat header -->
  <rect x="200" y="100" width="400" height="60" rx="20" fill="#334155"/>
  <circle cx="230" cy="130" r="15" fill="#10b981"/>
  <text x="260" y="135" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">AI Assistant</text>
  
  <!-- Messages -->
  <rect x="220" y="180" width="300" height="40" rx="20" fill="#475569"/>
  <text x="235" y="205" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">¡Hola! ¿Cómo puedo ayudarte?</text>
  
  <rect x="280" y="240" width="300" height="40" rx="20" fill="#0ea5e9"/>
  <text x="295" y="265" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Necesito información sobre IA</text>
  
  <rect x="220" y="300" width="340" height="60" rx="20" fill="#475569"/>
  <text x="235" y="325" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Perfecto! Ofrecemos chatbots,</text>
  <text x="235" y="340" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">análisis predictivo y más.</text>
  
  <!-- Neural network -->
  <g transform="translate(50, 200)" opacity="0.6">
    <circle cx="50" cy="50" r="8" fill="#8b5cf6"/>
    <circle cx="50" cy="100" r="8" fill="#8b5cf6"/>
    <circle cx="50" cy="150" r="8" fill="#8b5cf6"/>
    
    <circle cx="150" cy="75" r="10" fill="#06b6d4"/>
    <circle cx="150" cy="125" r="10" fill="#06b6d4"/>
    
    <line x1="58" y1="50" x2="142" y2="75" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <line x1="58" y1="100" x2="142" y2="125" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Brain icon -->
  <g transform="translate(650, 150)">
    <circle cx="50" cy="50" r="40" fill="#8b5cf6" opacity="0.3"/>
    <path d="M30 35 C40 25, 60 25, 70 35 C75 30, 85 30, 90 40 C95 45, 95 55, 90 60 C85 70, 75 70, 70 65 C60 75, 40 75, 30 65 C25 70, 15 70, 10 60 C5 55, 5 45, 10 40 C15 30, 25 30, 30 35 Z" fill="#8b5cf6"/>
  </g>
  
  <!-- Data visualization -->
  <rect x="100" y="450" width="600" height="100" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="400" y="475" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Análisis Predictivo</text>
  
  <!-- Chart bars -->
  <rect x="150" y="510" width="20" height="30" fill="#8b5cf6"/>
  <rect x="180" y="500" width="20" height="40" fill="#06b6d4"/>
  <rect x="210" y="515" width="20" height="25" fill="#10b981"/>
  <rect x="240" y="495" width="20" height="45" fill="#f59e0b"/>
</svg>