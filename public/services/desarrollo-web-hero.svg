<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Code editor mockup -->
  <rect x="150" y="100" width="500" height="350" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="150" y="100" width="500" height="40" rx="12" fill="#334155"/>
  
  <!-- Window controls -->
  <circle cx="170" cy="120" r="6" fill="#ef4444"/>
  <circle cx="190" cy="120" r="6" fill="#f59e0b"/>
  <circle cx="210" cy="120" r="6" fill="#22c55e"/>
  
  <!-- Code lines -->
  <rect x="170" y="160" width="120" height="8" rx="4" fill="#0ea5e9"/>
  <rect x="300" y="160" width="80" height="8" rx="4" fill="#22c55e"/>
  <rect x="170" y="180" width="200" height="8" rx="4" fill="#64748b"/>
  <rect x="190" y="200" width="150" height="8" rx="4" fill="#0ea5e9"/>
  <rect x="190" y="220" width="100" height="8" rx="4" fill="#f59e0b"/>
  <rect x="170" y="240" width="180" height="8" rx="4" fill="#64748b"/>
  <rect x="190" y="260" width="120" height="8" rx="4" fill="#22c55e"/>
  
  <!-- Browser mockup -->
  <rect x="550" y="150" width="400" height="280" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="550" y="150" width="400" height="35" rx="12" fill="#f1f5f9"/>
  
  <!-- Browser controls -->
  <circle cx="570" cy="167" r="4" fill="#ef4444"/>
  <circle cx="585" cy="167" r="4" fill="#f59e0b"/>
  <circle cx="600" cy="167" r="4" fill="#22c55e"/>
  
  <!-- URL bar -->
  <rect x="620" y="160" width="200" height="15" rx="8" fill="#e2e8f0"/>
  <text x="630" y="170" font-family="Arial, sans-serif" font-size="8" fill="#64748b">www.ejemplo.com</text>
  
  <!-- Website content -->
  <rect x="570" y="200" width="360" height="20" rx="4" fill="#0ea5e9"/>
  <rect x="570" y="230" width="280" height="8" rx="4" fill="#64748b"/>
  <rect x="570" y="245" width="320" height="8" rx="4" fill="#64748b"/>
  <rect x="570" y="260" width="200" height="8" rx="4" fill="#64748b"/>
  
  <!-- Cards -->
  <rect x="570" y="285" width="110" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="690" y="285" width="110" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="810" y="285" width="110" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  
  <!-- Mobile device -->
  <rect x="1000" y="180" width="120" height="220" rx="20" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="1015" y="200" width="90" height="160" rx="8" fill="#ffffff"/>
  <circle cx="1060" cy="380" r="15" fill="#334155"/>
  
  <!-- Mobile content -->
  <rect x="1025" y="210" width="70" height="12" rx="4" fill="#0ea5e9"/>
  <rect x="1025" y="230" width="50" height="6" rx="3" fill="#64748b"/>
  <rect x="1025" y="240" width="60" height="6" rx="3" fill="#64748b"/>
  
  <!-- Floating elements -->
  <circle cx="100" cy="150" r="30" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="1100" cy="100" r="40" fill="#22c55e" opacity="0.15"/>
  <rect x="80" y="400" width="60" height="60" rx="30" fill="#f59e0b" opacity="0.1"/>
  
  <!-- Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">Desarrollo Web Profesional</text>
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Sitios web modernos, responsivos y optimizados</text>
</svg>