<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="aiBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="neuralGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#aiBg)"/>
  
  <!-- Neural network visualization -->
  <g opacity="0.6">
    <!-- Nodes layer 1 -->
    <circle cx="200" cy="150" r="8" fill="#8b5cf6"/>
    <circle cx="200" cy="200" r="8" fill="#8b5cf6"/>
    <circle cx="200" cy="250" r="8" fill="#8b5cf6"/>
    <circle cx="200" cy="300" r="8" fill="#8b5cf6"/>
    <circle cx="200" cy="350" r="8" fill="#8b5cf6"/>
    
    <!-- Nodes layer 2 -->
    <circle cx="350" cy="125" r="10" fill="#06b6d4"/>
    <circle cx="350" cy="175" r="10" fill="#06b6d4"/>
    <circle cx="350" cy="225" r="10" fill="#06b6d4"/>
    <circle cx="350" cy="275" r="10" fill="#06b6d4"/>
    <circle cx="350" cy="325" r="10" fill="#06b6d4"/>
    <circle cx="350" cy="375" r="10" fill="#06b6d4"/>
    
    <!-- Nodes layer 3 -->
    <circle cx="500" cy="150" r="12" fill="#10b981"/>
    <circle cx="500" cy="200" r="12" fill="#10b981"/>
    <circle cx="500" cy="250" r="12" fill="#10b981"/>
    <circle cx="500" cy="300" r="12" fill="#10b981"/>
    <circle cx="500" cy="350" r="12" fill="#10b981"/>
    
    <!-- Connections -->
    <line x1="208" y1="150" x2="342" y2="125" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <line x1="208" y1="200" x2="342" y2="175" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <line x1="208" y1="250" x2="342" y2="225" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <line x1="208" y1="300" x2="342" y2="275" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    
    <line x1="360" y1="175" x2="488" y2="200" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
    <line x1="360" y1="225" x2="488" y2="250" stroke="#06b6d4" stroke-width="3" opacity="0.8"/>
    <line x1="360" y1="275" x2="488" y2="300" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Chatbot interface -->
  <rect x="650" y="120" width="400" height="360" rx="20" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  
  <!-- Chat header -->
  <rect x="650" y="120" width="400" height="60" rx="20" fill="#334155"/>
  <circle cx="680" cy="150" r="15" fill="#10b981"/>
  <text x="710" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">AI Assistant</text>
  <circle cx="1010" cy="150" r="4" fill="#10b981"/>
  <text x="1020" y="155" font-family="Arial, sans-serif" font-size="12" fill="#10b981">En línea</text>
  
  <!-- Chat messages -->
  <rect x="670" y="200" width="280" height="40" rx="20" fill="#475569"/>
  <text x="685" y="220" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">¡Hola! ¿En qué puedo ayudarte hoy?</text>
  
  <rect x="750" y="260" width="280" height="40" rx="20" fill="#0ea5e9"/>
  <text x="765" y="280" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Necesito información sobre sus servicios</text>
  
  <rect x="670" y="320" width="320" height="60" rx="20" fill="#475569"/>
  <text x="685" y="340" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Perfecto! Ofrecemos desarrollo web, IA,</text>
  <text x="685" y="355" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">automatización y ciberseguridad.</text>
  <text x="685" y="370" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">¿Qué te interesa más?</text>
  
  <!-- Input area -->
  <rect x="670" y="420" width="300" height="35" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="685" y="440" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Escribe tu mensaje...</text>
  <circle cx="1000" cy="437" r="12" fill="#0ea5e9"/>
  <text x="996" y="442" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">→</text>
  
  <!-- Data visualization -->
  <g transform="translate(100, 450)">
    <rect x="0" y="0" width="300" height="120" rx="12" fill="#0f172a" stroke="#334155" opacity="0.8"/>
    <text x="150" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Análisis en Tiempo Real</text>
    
    <!-- Chart bars -->
    <rect x="20" y="80" width="15" height="30" fill="#8b5cf6"/>
    <rect x="40" y="70" width="15" height="40" fill="#06b6d4"/>
    <rect x="60" y="85" width="15" height="25" fill="#10b981"/>
    <rect x="80" y="60" width="15" height="50" fill="#f59e0b"/>
    <rect x="100" y="75" width="15" height="35" fill="#ef4444"/>
    
    <!-- Metrics -->
    <text x="150" y="45" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Precisión: 94.2%</text>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Respuestas/min: 127</text>
  </g>
  
  <!-- Floating AI elements -->
  <circle cx="1050" cy="200" r="25" fill="url(#neuralGlow)"/>
  <circle cx="150" cy="100" r="35" fill="url(#neuralGlow)"/>
  <circle cx="1100" cy="450" r="20" fill="url(#neuralGlow)"/>
  
  <!-- Brain icon -->
  <g transform="translate(850, 50)">
    <path d="M50 20 C60 10, 80 10, 90 20 C95 15, 105 15, 110 25 C115 30, 115 40, 110 45 C105 55, 95 55, 90 50 C80 60, 60 60, 50 50 C45 55, 35 55, 30 45 C25 40, 25 30, 30 25 C35 15, 45 15, 50 20 Z" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="65" cy="35" r="3" fill="#ffffff"/>
    <circle cx="85" cy="35" r="3" fill="#ffffff"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">Inteligencia Artificial</text>
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="18" fill="#a78bfa" text-anchor="middle">Chatbots inteligentes y análisis predictivo</text>
</svg>