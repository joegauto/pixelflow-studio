<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="secBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#secBg2)"/>
  
  <!-- Shield -->
  <g transform="translate(350, 150)">
    <path d="M50 20 L80 35 L80 80 C80 95, 65 110, 50 110 C35 110, 20 95, 20 80 L20 35 Z" fill="#22c55e" stroke="#16a34a" stroke-width="3"/>
    <path d="M40 60 L45 65 L60 45" stroke="#ffffff" stroke-width="4" fill="none"/>
  </g>
  
  <!-- Security dashboard -->
  <rect x="150" y="300" width="500" height="200" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Security Monitor</text>
  
  <!-- Threat indicators -->
  <rect x="180" y="350" width="100" height="50" rx="6" fill="#22c55e"/>
  <text x="230" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">SECURE</text>
  
  <rect x="300" y="350" width="100" height="50" rx="6" fill="#0ea5e9"/>
  <text x="350" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">247 SCANS</text>
  
  <rect x="420" y="350" width="100" height="50" rx="6" fill="#f59e0b"/>
  <text x="470" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">12 UPDATES</text>
  
  <!-- Network diagram -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="40" height="30" rx="4" fill="#334155" stroke="#22c55e" stroke-width="2"/>
    <text x="20" y="18" font-family="Arial, sans-serif" font-size="8" fill="#22c55e" text-anchor="middle">SERVER</text>
    
    <rect x="80" y="0" width="40" height="30" rx="4" fill="#ef4444"/>
    <text x="100" y="18" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">FIREWALL</text>
  </g>
