<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="supportBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#supportBg2)"/>
  
  <!-- Support center -->
  <rect x="200" y="150" width="400" height="300" rx="15" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="400" y="180" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Centro de Soporte 24/7</text>
  
  <!-- Tickets -->
  <rect x="220" y="200" width="360" height="30" rx="4" fill="#22c55e"/>
  <text x="230" y="220" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Ticket #1247 - Resuelto</text>
  
  <rect x="220" y="240" width="360" height="30" rx="4" fill="#f59e0b"/>
  <text x="230" y="260" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Ticket #1248 - En progreso</text>
  
  <rect x="220" y="280" width="360" height="30" rx="4" fill="#0ea5e9"/>
  <text x="230" y="300" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Ticket #1249 - Nuevo</text>
  
  <!-- 24/7 indicator -->
  <g transform="translate(100, 200)">
    <circle cx="50" cy="50" r="40" fill="#1e40af"/>
    <text x="50" y="60" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">24/7</text>
  </g>
  
  <!-- Metrics -->
  <rect x="200" y="350" width="400" height="80" rx="8" fill="#0f172a"/>
  <text x="400" y="375" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Métricas de Respuesta</text>
  
  <rect x="220" y="385" width="80" height="35" rx="6" fill="#22c55e"/>
  <text x="260" y="405" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">&lt; 5min</text>
  
  <rect x="320" y="385" width="80" height="35" rx="6" fill="#0ea5e9"/>
  <text x="360" y="405" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">98.5%</text>
  
  <rect x="420" y="385" width="80" height="35" rx="6" fill="#f59e0b"/>
  <text x="460" y="405" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">2.3h</text>
  
  <rect x="520" y="385" width="60" height="35" rx="6" fill="#8b5cf6"/>
  <text x="550" y="405" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">365</text>
