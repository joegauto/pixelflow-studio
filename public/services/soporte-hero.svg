<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="supportBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="monitorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#supportBg)"/>
  
  <!-- Support center setup -->
  <g transform="translate(100, 120)">
    <!-- Main monitor -->
    <rect x="200" y="50" width="300" height="200" rx="12" fill="#1e293b" stroke="#475569" stroke-width="3"/>
    <rect x="210" y="60" width="280" height="160" rx="8" fill="#0f172a"/>
    
    <!-- Monitor stand -->
    <rect x="330" y="250" width="40" height="30" fill="#475569"/>
    <rect x="300" y="280" width="100" height="15" rx="8" fill="#475569"/>
    
    <!-- Screen content - Support dashboard -->
    <rect x="220" y="80" width="260" height="30" rx="4" fill="#1e40af"/>
    <text x="350" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Centro de Soporte 24/7</text>
    
    <!-- Ticket list -->
    <rect x="230" y="120" width="240" height="20" rx="4" fill="#22c55e" opacity="0.8"/>
    <text x="240" y="135" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">Ticket #1247 - Resuelto - Cliente ABC</text>
    
    <rect x="230" y="145" width="240" height="20" rx="4" fill="#f59e0b" opacity="0.8"/>
    <text x="240" y="160" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">Ticket #1248 - En progreso - Empresa XYZ</text>
    
    <rect x="230" y="170" width="240" height="20" rx="4" fill="#0ea5e9" opacity="0.8"/>
    <text x="240" y="185" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">Ticket #1249 - Nuevo - Startup DEF</text>
    
    <!-- Stats -->
    <text x="240" y="210" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Tiempo promedio: 15 min</text>
    <text x="240" y="225" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Satisfacción: 98.5%</text>
    
    <!-- Secondary monitors -->
    <rect x="0" y="80" width="180" height="120" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <rect x="10" y="90" width="160" height="90" rx="4" fill="#0f172a"/>
    
    <!-- System monitoring -->
    <text x="90" y="110" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Monitoreo</text>
    <circle cx="50" cy="130" r="15" fill="#22c55e"/>
    <text x="50" y="135" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">CPU</text>
    <text x="50" y="155" font-family="Arial, sans-serif" font-size="8" fill="#22c55e" text-anchor="middle">23%</text>
    
    <circle cx="90" cy="130" r="15" fill="#0ea5e9"/>
    <text x="90" y="135" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">RAM</text>
    <text x="90" y="155" font-family="Arial, sans-serif" font-size="8" fill="#0ea5e9" text-anchor="middle">67%</text>
    
    <circle cx="130" cy="130" r="15" fill="#f59e0b"/>
    <text x="130" y="135" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">DISK</text>
    <text x="130" y="155" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">45%</text>
    
    <!-- Right monitor -->
    <rect x="520" y="80" width="180" height="120" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <rect x="530" y="90" width="160" height="90" rx="4" fill="#0f172a"/>
    
    <!-- Communication tools -->
    <text x="610" y="110" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Comunicación</text>
    
    <rect x="540" y="120" width="60" height="20" rx="4" fill="#22c55e"/>
    <text x="570" y="133" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">WhatsApp</text>
    
    <rect x="610" y="120" width="60" height="20" rx="4" fill="#0ea5e9"/>
    <text x="640" y="133" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Email</text>
    
    <rect x="540" y="150" width="60" height="20" rx="4" fill="#8b5cf6"/>
    <text x="570" y="163" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Slack</text>
    
    <rect x="610" y="150" width="60" height="20" rx="4" fill="#f59e0b"/>
    <text x="640" y="163" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Teams</text>
  </g>
  
  <!-- 24/7 indicator -->
  <g transform="translate(800, 150)">
    <circle cx="100" cy="100" r="80" fill="url(#monitorGlow)"/>
    <circle cx="100" cy="100" r="60" fill="#1e40af" stroke="#3b82f6" stroke-width="4"/>
    
    <!-- Clock -->
    <circle cx="100" cy="100" r="40" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <line x1="100" y1="100" x2="100" y2="75" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="115" y2="100" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="100" cy="100" r="3" fill="#ffffff"/>
    
    <!-- 24/7 text -->
    <text x="100" y="190" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">24/7</text>
    <text x="100" y="210" font-family="Arial, sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle">Disponible siempre</text>
  </g>
  
  <!-- Response time metrics -->
  <g transform="translate(150, 380)">
    <rect x="0" y="0" width="400" height="100" rx="12" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="200" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Métricas de Respuesta</text>
    
    <!-- Metrics cards -->
    <rect x="20" y="40" width="80" height="45" rx="6" fill="#22c55e" opacity="0.8"/>
    <text x="60" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">< 5min</text>
    <text x="60" y="70" font-family="Arial, sans-serif" font-size="9" fill="#bbf7d0" text-anchor="middle">Primera respuesta</text>
    
    <rect x="110" y="40" width="80" height="45" rx="6" fill="#0ea5e9" opacity="0.8"/>
    <text x="150" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">98.5%</text>
    <text x="150" y="70" font-family="Arial, sans-serif" font-size="9" fill="#bae6fd" text-anchor="middle">Satisfacción</text>
    
    <rect x="200" y="40" width="80" height="45" rx="6" fill="#f59e0b" opacity="0.8"/>
    <text x="240" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">2.3h</text>
    <text x="240" y="70" font-family="Arial, sans-serif" font-size="9" fill="#fde68a" text-anchor="middle">Resolución avg</text>
    
    <rect x="290" y="40" width="80" height="45" rx="6" fill="#8b5cf6" opacity="0.8"/>
    <text x="330" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">365</text>
    <text x="330" y="70" font-family="Arial, sans-serif" font-size="9" fill="#ddd6fe" text-anchor="middle">Días al año</text>
  </g>
  
  <!-- Support channels -->
  <g transform="translate(650, 380)">
    <rect x="0" y="0" width="300" height="100" rx="12" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Canales de Soporte</text>
    
    <!-- Channel icons -->
    <circle cx="50" cy="60" r="20" fill="#22c55e"/>
    <text x="50" y="67" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">📞</text>
    <text x="50" y="85" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Teléfono</text>
    
    <circle cx="110" cy="60" r="20" fill="#0ea5e9"/>
    <text x="110" y="67" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">💬</text>
    <text x="110" y="85" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Chat</text>
    
    <circle cx="170" cy="60" r="20" fill="#f59e0b"/>
    <text x="170" y="67" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">📧</text>
    <text x="170" y="85" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Email</text>
    
    <circle cx="230" cy="60" r="20" fill="#8b5cf6"/>
    <text x="230" y="67" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">🎫</text>
    <text x="230" y="85" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Tickets</text>
  </g>
  
  <!-- Floating elements -->
  <circle cx="50" cy="100" r="25" fill="#3b82f6" opacity="0.2"/>
  <circle cx="1150" cy="500" r="30" fill="#22c55e" opacity="0.15"/>
  <rect x="1050" y="50" width="40" height="40" rx="20" fill="#f59e0b" opacity="0.2"/>
  
  <!-- Notification indicators -->
  <g opacity="0.7">
    <circle cx="1100" cy="150" r="8" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1120" cy="170" r="6" fill="#0ea5e9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="180" r="5" fill="#f59e0b">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">Soporte Técnico 24/7</text>
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="18" fill="#93c5fd" text-anchor="middle">Asistencia profesional cuando la necesites</text>
</svg>